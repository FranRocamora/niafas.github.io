<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Niafas Bites</title>

<style>

/* GENERAL */

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:#fff8f0;
color:#333;
}

/* HEADER */

header{
background:#66396E;
padding:40px;
text-align:center;
}

.logo{
width:280px;
}

header h1{
font-size:42px;
margin:10px 0;
}

header p{
font-size:18px;
}

/* PRODUCTS */

.products{
padding:60px;
text-align:center;
}

.products h2{
font-size:32px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
border-radius:16px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card h3{
font-size:22px;
margin:10px 0;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:40px;
border-radius:15px;
max-width:500px;
text-align:center;
}

.modal img{
width:100%;
border-radius:10px;
}

button{
margin-top:20px;
background:#25D366;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:30px;
cursor:pointer;
}

/* CONTACT */

.contact{
text-align:center;
padding:70px 20px;
background:#fff2cc;
}

.contact h2{
font-size:32px;
margin-bottom:20px;
}

.contact-buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.call{
background:#333;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

/* FOOTER */

footer{
margin-top:40px;
padding:30px;
background:#f4d03f;
text-align:center;
}

footer a{
text-decoration:none;
font-weight:bold;
color:black;
}

</style>

</head>

<body>

<!-- HEADER -->

<header>

<img src="logo.png" class="logo">

<h1>Mini Bites</h1>
<p>Antojos irresistibles para todos los gustos</p>

</header>

<!-- PRODUCTS -->

<section class="products">

<h2>Nuestros Productos</h2>

<div class="grid">

<div class="card" onclick="openModal('Mini Cookies','Mini galletas caseras suaves y llenas de sabor.')">
<h3>Mini Cookies</h3>
</div>

<div class="card" onclick="openModal('Pan de Bono','Pan de bono tradicional colombiano con queso, suave por dentro y ligeramente crujiente por fuera.')">
<h3>Pan de Bono</h3>
</div>

<div class="card" onclick="openModal('Polvorosas','Deliciosas galletas de mantequilla que se derriten en tu boca.')">
<h3>Polvorosas</h3>
</div>

<div class="card" onclick="openModal('Trufas de Mani y Chocolate','Trufas de chocolate con delicioso sabor a maní.')">
<h3>Trufas de Mani y Chocolate</h3>
</div>

<div class="card" onclick="openModal('Barras de Cookies','Barras de galleta con intenso sabor a chocolate y su topping de chocolate.')">
<h3>Barras de Cookies</h3>
</div>

</div>

</section>

<!-- PRODUCT MODAL -->

<div class="modal" id="productModal">

<div class="modal-content">

<h2 id="productTitle"></h2>

<p id="productDescription"></p>

<a id="whatsappBtn" target="_blank">
<button>Ordena por WhatsApp</button>
</a>

<br><br>

<button onclick="closeModal()">Cerrar</button>

</div>

</div>

<!-- CONTACT -->

<section class="contact">

<h2>Contáctanos</h2>

<div class="contact-buttons">

<a href="tel:+584144332483">
<button class="call">Llámanos</button>
</a>

<a href="https://wa.me/584144332483" target="_blank">
<button class="whatsapp">WhatsApp</button>
</a>

</div>

</section>

<!-- FOOTER -->

<footer>

<p>Síguenos en Instagram</p>

<a href="https://instagram.com/niafasbites" target="_blank">
@niafasbites
</a>

</footer>

<script>

function openModal(title, description){

document.getElementById("productTitle").innerText = title;
document.getElementById("productDescription").innerText = description;

let message = "Hola! Quiero ordenar " + title + " de Niafas Bites.";

document.getElementById("whatsappBtn").href =
"https://wa.me/584144332483?text=" + encodeURIComponent(message);

document.getElementById("productModal").style.display = "flex";

}

function closeModal(){
document.getElementById("productModal").style.display = "none";
}

</script>

</body>

</html>
