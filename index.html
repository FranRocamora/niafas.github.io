<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Niafas Bites</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#fff8f0;
color:#333;
}

/* HEADER */

header{
background:#f4d03f;
padding:40px;
text-align:center;
}

.logo{
width:180px;
}

header h1{
font-size:42px;
margin:10px 0;
}

header p{
font-size:18px;
}

/* PRODUCTS */

.products{
padding:60px;
text-align:center;
}

.products h2{
font-size:32px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
border-radius:16px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card h3{
font-size:22px;
margin:10px 0;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:40px;
border-radius:15px;
max-width:500px;
text-align:center;
}

.modal img{
width:100%;
border-radius:10px;
}

button{
margin-top:20px;
background:#25D366;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:30px;
cursor:pointer;
}

/* FOOTER */

footer{
margin-top:80px;
padding:30px;
background:#f4d03f;
text-align:center;
}

footer a{
text-decoration:none;
font-weight:bold;
color:black;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>Niafas Bites</h1>

<p>The sweetest homemade treats 🍪</p>

</header>

<section class="products">

<h2>Our Products</h2>

<div class="grid">

<div class="card" onclick="openModal('Mini Cookies','Soft homemade mini cookies packed with flavor.')">
<h3>Mini Cookies</h3>
</div>

<div class="card" onclick="openModal('Pan de Bono','Traditional cheesy Colombian bread, soft inside and crispy outside.')">
<h3>Pan de Bono</h3>
</div>

<div class="card" onclick="openModal('Polvorosas','Delicious buttery cookies that melt in your mouth.')">
<h3>Polvorosas</h3>
</div>

<div class="card" onclick="openModal('Trufas de Mani y Chocolate','Chocolate truffles mixed with peanut flavor.')">
<h3>Trufas de Mani y Chocolate</h3>
</div>

<div class="card" onclick="openModal('Barras de Cookies','Thick cookie bars with rich chocolate flavor.')">
<h3>Barras de Cookies</h3>
</div>

</div>

</section>

<div class="modal" id="productModal">

<div class="modal-content">

<h2 id="productTitle"></h2>

<p id="productDescription"></p>

<a id="whatsappBtn" target="_blank">

<button>Order on WhatsApp</button>

</a>

<br><br>

<button onclick="closeModal()">Close</button>

</div>

</div>

<footer>

<p>Follow us on Instagram</p>

<a href="https://instagram.com/niafasbites" target="_blank">
@niafasbites
</a>

</footer>

<script>

function openModal(title,description){

document.getElementById("productTitle").innerText = title;
document.getElementById("productDescription").innerText = description;

let message = "Hello! I want to order " + title + " from Niafas Bites.";

document.getElementById("whatsappBtn").href =
"https://wa.me/?text=" + encodeURIComponent(message);

document.getElementById("productModal").style.display="flex";

}

function closeModal(){
document.getElementById("productModal").style.display="none";
}

</script>

</body>

</html>
